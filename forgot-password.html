<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PTS NEWS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #001A56 0%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #001A56 0%, #002a7a 100%);
            padding: 40px 40px 30px;
            text-align: center;
        }

        .login-logo {
    width: 80px;
    height: auto;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
    margin: 20px auto;
}



        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-header h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .login-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Manrope', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #001A56;
            box-shadow: 0 0 0 4px rgba(0, 26, 86, 0.1);
        }

        .form-group input:focus + i,
        .input-wrapper:focus-within i {
            color: #001A56;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #F21517 0%, #d40f11 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(242, 21, 23, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .back-home {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e5e5e5;
        }

        .back-home a {
            color: #666;
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-home a:hover {
            color: #001A56;
        }

        .back-home a i {
            font-size: 16px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .message.show {
            display: flex;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
        }

        .message i {
            font-size: 18px;
        }

        .login-footer {
            background: #f8f9fa;
            padding: 20px 40px;
            text-align: center;
        }

        .login-footer p {
            color: #666;
            font-size: 12px;
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #001A56;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                border-radius: 15px;
            }
            
            .login-header {
                padding: 30px 25px 20px;
            }
            
            .login-header h1 {
                font-size: 20px;
            }
            
            .login-body {
                padding: 30px 25px;
            }
            
            .form-group input {
                padding: 12px 12px 12px 40px;
            }
            
            .login-footer {
                padding: 15px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="assets/images/20210512190118_logo_21.png" alt="PTS NEWS" class="login-logo">
            <h1>Reset Password</h1>
            <p>Enter your username to reset your password</p>
        </div>
        
        <div class="login-body">
            <div class="message" id="message">
                <i class="ri-error-warning-line"></i>
                <span id="messageText"></span>
            </div>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        <i class="ri-user-line"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>
            
            <div class="back-home">
                <a href="admin-login.html">
                    <i class="ri-arrow-left-line"></i>
                    Back to Login
                </a>
            </div>
        </div>
        
        <div class="login-footer">
            <p>&copy; 2025 PTS NEWS. All rights reserved.</p>
        </div>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const messageDiv = document.getElementById('message');
            const messageText = document.getElementById('messageText');
            const submitBtn = document.querySelector('.login-btn');
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            
            try {
                const response = await fetch('api/forgot-password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username: username })
                });
                
                const data = await response.json();
                
                messageDiv.classList.remove('success', 'error', 'show');
                
                if (data.success) {
                    messageDiv.classList.add('success', 'show');
                    messageDiv.querySelector('i').className = 'ri-check-line';
                    messageText.textContent = data.message;
                    document.getElementById('username').value = '';
                } else {
                    messageDiv.classList.add('error', 'show');
                    messageDiv.querySelector('i').className = 'ri-error-warning-line';
                    messageText.textContent = data.message || 'An error occurred. Please try again.';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.classList.add('error', 'show');
                messageDiv.querySelector('i').className = 'ri-error-warning-line';
                messageText.textContent = 'Network error: ' + error.message + '. Please ensure PHP is running and try again.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
